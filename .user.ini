; Exam项目PHP安全配置

; 关闭错误显示
display_errors = Off
display_startup_errors = Off

; 记录错误到日志
log_errors = On
error_log = logs/php_errors.log

; Session安全
session.cookie_httponly = 1
session.use_only_cookies = 1
session.cookie_samesite = Strict

; 文件上传限制
upload_max_filesize = 10M
post_max_size = 10M
max_file_uploads = 5
